name: Update ORCID Publications

on:
  # Run automatically every day at 06:00 UTC
  schedule:
    - cron: '0 6 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
  
  # Run when this workflow file is modified
  push:
    paths:
      - '.github/workflows/update-orcid-publications.yml'
      - 'scripts/fetch_orcid_publications.py'

jobs:
  update-publications:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Debug - Check secrets availability
        run: |
          echo "Checking if secrets are available..."
          if [ -z "${{ secrets.ORCID_ID }}" ]; then
            echo "❌ ORCID_ID secret is NOT set"
          else
            echo "✅ ORCID_ID secret is set"
          fi
          if [ -z "${{ secrets.ORCID_CLIENT_ID }}" ]; then
            echo "❌ ORCID_CLIENT_ID secret is NOT set"
          else
            echo "✅ ORCID_CLIENT_ID secret is set"
          fi
          if [ -z "${{ secrets.ORCID_CLIENT_SECRET }}" ]; then
            echo "❌ ORCID_CLIENT_SECRET secret is NOT set"
          else
            echo "✅ ORCID_CLIENT_SECRET secret is set"
          fi
      
      - name: Fetch publications from ORCID
        env:
          ORCID_ID: ${{ secrets.ORCID_ID }}
          ORCID_CLIENT_ID: ${{ secrets.ORCID_CLIENT_ID }}
          ORCID_CLIENT_SECRET: ${{ secrets.ORCID_CLIENT_SECRET }}
        run: |
          python scripts/fetch_orcid_publications.py
      
      - name: Check for changes
        id: check_changes
        run: |
          git add _publications/
          if [[ -n $(git diff --cached --name-only) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "✓ New or updated publications found"
            git diff --cached --name-only
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "✓ No new publications"
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "🔄 Auto-update publications from ORCID [skip ci]"
          git push
      
      - name: Create summary
        if: always()
        run: |
          echo "## ORCID Publications Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.check_changes.outputs.changes }}" == "true" ]]; then
            echo "✅ Publications updated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "New or updated publications have been fetched from ORCID and committed." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All publications are already in sync with ORCID." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ORCID ID**: ${{ secrets.ORCID_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "**Last checked**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Schedule**: Daily at 06:00 UTC" >> $GITHUB_STEP_SUMMARY
